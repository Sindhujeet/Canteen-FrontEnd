<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: rgb(6, 219, 165);
}
.container {
    width: 98%;
    max-width: 1600px;
    margin: auto;
    padding: 40px 0;
}
.admin-panel {
    background: rgb(121, 130, 214);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 50px;
}
.admin-panel input,
.admin-panel select {
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: none;
}
.admin-panel button {
    padding: 10px 20px;
    background: #d8ea0a;
    color: red;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.preview-img{
    width:150px;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    margin-top:10px;
    display:block;
}

.category-buttons {
    text-align: center;
    margin-bottom: 20px;
}
.category-buttons button {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    background: #1f2937;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
.category-buttons button.active {
    background: #e11d48;
}
.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}
.card {
    background: #b5cb0d;
    padding: 15px;
    border-radius: 10px;
}
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}
.price { color: red; font-weight: bold; }
</style>
</head>

<body>
<div id="navbar-container"></div>

<script>
    fetch("navbar.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("navbar-container").innerHTML = data;
        });
</script>
<div class="container">

<div class="admin-panel">
<h1><center>Admin Daily Menu</center></h1>

<input id="name" placeholder="Item name">
<input id="desc" placeholder="Description">
<input id="price" type="number" placeholder="Price (₹)">
<input id="quantity" type="number" placeholder="Stock Quantity"> <br>

<input id="imageUrl" placeholder="Image URL">
<br>
<label>Or Upload Image (Base64):</label>
<input type="file" id="imageFile" accept="image/*">

<img id="preview" class="preview-img" style="display:none;">

<br>

<input id="newCategory" placeholder="New Category">
<button onclick="addCategory()">Add Category</button>

<br><br>

<select id="category"></select>
<button onclick="deleteCategory()">Delete Category (Local only)</button>

<br><br>

<label>
<input type="checkbox" id="isSpecial"> Mark as Special (Overrides Category)
</label>

<br><br>

<button onclick="addItem()">Add / Update Item</button>
</div>

<h1><center>Explore Menu</center></h1>

<div class="category-buttons" id="categoryButtons"></div>
<div class="menu-grid" id="menuContainer"></div>

</div>

<script>
const API_URL = "http://localhost:8000/api";
let menu = [];
let editId = null;

/* ===== CATEGORY (Local UI Only) ===== */
let categories = JSON.parse(localStorage.getItem("categories")) || ["Breakfast","Lunch","Dinner","Dessert","Others", "Special"];

function saveCategories(){
    localStorage.setItem("categories", JSON.stringify(categories));
}

function loadCategories(){
    let select = document.getElementById("category");
    let btnDiv = document.getElementById("categoryButtons");

    select.innerHTML="";
    btnDiv.innerHTML="";

    let allBtn=document.createElement("button");
    allBtn.innerText="All";
    allBtn.classList.add("active");
    allBtn.onclick=(e)=>filterMenu("All", e);
    btnDiv.appendChild(allBtn);

    categories.forEach(cat=>{
        let option=document.createElement("option");
        option.value=cat;
        option.textContent=cat;
        select.appendChild(option);

        let btn=document.createElement("button");
        btn.innerText=cat;
        btn.onclick=(e)=>filterMenu(cat,e);
        btnDiv.appendChild(btn);
    });
}

function addCategory(){
    let newCat=document.getElementById("newCategory").value.trim();
    if(!newCat) return;
    if(categories.includes(newCat)){
        alert("Category exists");
        return;
    }
    categories.push(newCat);
    saveCategories();
    loadCategories();
}

function deleteCategory(){
    let cat=document.getElementById("category").value;
    categories=categories.filter(c=>c!==cat);
    saveCategories();
    loadCategories();
}

/* ===== FETCH MENU FROM BACKEND ===== */
async function fetchMenu() {
    try {
        const res = await fetch(`${API_URL}/item-list`);
        const result = await res.json();
        if (result.status === 1) {
            menu = result.data;
            displayMenu(menu);
        }
    } catch (err) {
        console.error("Error fetching menu:", err);
    }
}

/* ===== DISPLAY MENU ===== */
function displayMenu(items){
    let div=document.getElementById("menuContainer");
    div.innerHTML="";

    items.forEach(item=>{
        div.innerHTML+=`
        <div class="card">
        <img src="${item.image || 'https://via.placeholder.com/150'}">
        <h3>${item.name}</h3>
        <p>${item.description || ""}</p>
        <p class="price">₹${item.price} (Stock: ${item.quantity})</p>
        
        <p><strong>Category:</strong> ${item.category || 'None'}</p>

        <label>
        <input type="checkbox"
        ${item.available ? "checked" : ""}
        onclick="toggleItem('${item._id}', ${item.available})">
        Available
        </label><br><br>

        <button onclick="editItem('${item._id}')">Edit</button>
        <button onclick="deleteItem('${item._id}')" style="background: #ef4444; color: white;">Delete</button>
        </div>`;
    });
}

/* ===== TOGGLE AVAILABILITY ===== */
async function toggleItem(id, currentStatus){
    try {
        await fetch(`${API_URL}/item-update/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ available: !currentStatus })
        });
        fetchMenu(); // Refresh from DB
    } catch (err) {
        console.error("Error updating status:", err);
    }
}

function filterMenu(cat,e){
    document.querySelectorAll(".category-buttons button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");

    if(cat==="All") displayMenu(menu);
    else displayMenu(menu.filter(m=>m.category===cat));
}

/* ===== IMAGE PREVIEW ===== */
document.getElementById("imageFile").addEventListener("change", function(){
    let file=this.files[0];
    if(!file) return;

    let reader=new FileReader();
    reader.onload=function(e){
        let preview=document.getElementById("preview");
        preview.src=e.target.result;
        preview.style.display="block";
    };
    reader.readAsDataURL(file);
});

/* ===== ADD / UPDATE ITEM ===== */
async function addItem(){
    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = Number(document.getElementById("price").value);
    let quantity = Number(document.getElementById("quantity").value);
    let category = document.getElementById("category").value;
    let isSpecial = document.getElementById("isSpecial").checked;

    let imageUrl = document.getElementById("imageUrl").value;
    let imageFile = document.getElementById("imageFile").files[0];

    if(!name || price === undefined) return alert("Name and price are required");

    // Override category if Special is checked
    if (isSpecial) {
        category = "Special";
    }

    if(imageFile){
        let reader = new FileReader();
        reader.onload = function(e){
            saveToDatabase(name, desc, price, quantity, category, e.target.result);
        };
        reader.readAsDataURL(imageFile);
    } else {
        saveToDatabase(name, desc, price, quantity, category, imageUrl);
    }
}

async function saveToDatabase(name, description, price, quantity, category, image){
    
    let payload = {
        name,
        description,
        price,
        quantity,
        category,
        image
    };

    try {
        let url = editId ? `${API_URL}/item-update/${editId}` : `${API_URL}/item-insert`;
        let method = editId ? "PUT" : "POST";

        let res = await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        let result = await res.json();
        
        if (result.status === 1) {
            alert(editId ? "Item updated!" : "Item added!");
            editId = null;
            
            // Reset fields
            document.getElementById("name").value="";
            document.getElementById("desc").value="";
            document.getElementById("price").value="";
            document.getElementById("quantity").value="";
            document.getElementById("imageUrl").value="";
            document.getElementById("imageFile").value="";
            document.getElementById("preview").style.display="none";
            document.getElementById("isSpecial").checked = false;

            fetchMenu(); // Refresh UI from DB
        } else {
            alert("Error: " + result.message);
        }

    } catch (err) {
        console.error("Save error:", err);
        alert("Failed to save item to database.");
    }
}

/* ===== EDIT & DELETE ===== */
function editItem(id){
    let item = menu.find(m => m._id === id);
    if(!item) return;

    document.getElementById("name").value = item.name;
    document.getElementById("desc").value = item.description || "";
    document.getElementById("price").value = item.price;
    document.getElementById("quantity").value = item.quantity || 0;
    document.getElementById("imageUrl").value = item.image || "";
    
    if (item.category === "Special") {
        document.getElementById("isSpecial").checked = true;
    } else {
        document.getElementById("isSpecial").checked = false;
        document.getElementById("category").value = item.category;
    }

    editId = id;
    window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll up to the form
}

async function deleteItem(id){
    if(!confirm("Are you sure you want to delete this item?")) return;

    try {
        let res = await fetch(`${API_URL}/item-delete/${id}`, { method: "DELETE" });
        let result = await res.json();

        if (result.status === 1) {
            fetchMenu(); // Refresh UI from DB
        } else {
            alert("Error deleting item.");
        }
    } catch (err) {
        console.error("Delete error:", err);
    }
}

/* ===== INIT ===== */
loadCategories();
fetchMenu();

</script>
</body>
</html>
