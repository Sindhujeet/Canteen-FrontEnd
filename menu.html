<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --danger: #ef4444;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            /* High-Quality Mesh Gradient */
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 0;
        }

        /* Visibility Fix for Section Titles */
        .section-title {
            text-align: center;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5), 0 0 20px rgba(99, 102, 241, 0.4);
        }

        /* Admin Panel Card */
        .admin-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 60px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .admin-panel h1 {
            margin: 0 0 25px 0;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            color: #1e293b;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        input, select {
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            background: #ffffff;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .btn-primary { 
            background: #4f46e5;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); background: #4338ca; }

        /* Category Filter Buttons */
        .category-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 45px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .category-buttons button {
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .category-buttons button.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        }

        /* Menu Grid & Cards */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s ease-out;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card:hover { transform: translateY(-10px); }

        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .price { color: var(--success); font-weight: 800; font-size: 1.5rem; }
    </style>
</head>

<body>
    <div id="navbar-container"></div>

    <div class="container">
        <div class="admin-panel">
            <h1>Daily Menu Management</h1>
            
            <div class="form-grid">
                <input id="name" placeholder="Item Name">
                <input id="desc" placeholder="Brief Description">
                <input id="price" type="number" placeholder="Price (₹)">
                <input id="quantity" type="number" placeholder="Quantity">
            </div>

            <div class="form-grid">
                <input id="imageUrl" placeholder="Image URL (Recommended)">
                <input type="file" id="imageFile" accept="image/*">
            </div>

            <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr; background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 10px;">
                <div style="display:flex; gap:5px;">
                    <input id="newCategory" placeholder="Add Category" style="width:100px;">
                    <button class="btn-primary" onclick="addCategory()" style="padding:5px 15px;">+</button>
                </div>
                <select id="category"></select>
                <label style="font-weight:600; display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="isSpecial"> ⭐ Special
                </label>
            </div>

            <button class="btn-primary" onclick="addItem()" style="width:100%; margin-top:20px;">UPDATE LIVE MENU</button>
        </div>

        <h2 class="section-title">Explore Today's Menu</h2>

        <div class="category-buttons" id="categoryButtons"></div>
        <div class="menu-grid" id="menuContainer"></div>
    </div>

<script>
// Pointing directly to your live Render backend
const API_URL = "https://canteen-backend-jjya.onrender.com/api";
let menu = [];
let editId = null;

let categories = JSON.parse(localStorage.getItem("categories")) || ["Breakfast","Lunch","Dinner","Special"];

function saveCategories(){ localStorage.setItem("categories", JSON.stringify(categories)); }

function loadCategories(){
    let select = document.getElementById("category");
    let btnDiv = document.getElementById("categoryButtons");
    select.innerHTML=""; btnDiv.innerHTML="";

    let allBtn=document.createElement("button");
    allBtn.innerText="ALL ITEMS"; allBtn.classList.add("active");
    allBtn.onclick=(e)=>filterMenu("All", e);
    btnDiv.appendChild(allBtn);

    categories.forEach(cat=>{
        let option=document.createElement("option");
        option.value=cat; option.textContent=cat;
        select.appendChild(option);

        let btn=document.createElement("button");
        btn.innerText=cat.toUpperCase();
        btn.onclick=(e)=>filterMenu(cat,e);
        btnDiv.appendChild(btn);
    });
}

function addCategory(){
    let newCat=document.getElementById("newCategory").value.trim();
    if(!newCat || categories.includes(newCat)) return;
    categories.push(newCat); saveCategories(); loadCategories();
}

async function fetchMenu() {
    try {
        const res = await fetch(`${API_URL}/item-list`);
        const result = await res.json();
        if (result.status === 1) { menu = result.data; displayMenu(menu); }
    } catch (err) { console.error("Fetch error:", err); }
}

function displayMenu(items){
    let div=document.getElementById("menuContainer");
    div.innerHTML="";
    items.forEach(item=>{
        
        // --- Added Smart Stock Logic ---
        let stockQty = item.quantity || 0;
        let stockText = stockQty === 0 ? "Out of Stock" : `Stock: ${stockQty}`;
        let stockColor = stockQty === 0 ? "var(--danger)" : (stockQty <= 5 ? "orange" : "var(--success)");
        // -------------------------------

        div.innerHTML+=`
        <div class="card">
            <img src="${item.image || 'https://via.placeholder.com/400x250?text=No+Image'}">
            <div class="card-body">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0; color:#1e293b;">${item.name}</h3>
                    <span class="price">₹${item.price}</span>
                </div>
                
                <p style="margin: 5px 0; color:${stockColor}; font-weight:700; font-size:12px;">${stockText}</p>
                
                <p style="margin: 10px 0; color:#64748b; font-size:14px;">${item.description || "No description provided."}</p>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f1f5f9; padding-top:10px; margin-top:10px;">
                    <label style="font-size:12px; font-weight:700; color:#4f46e5;">
                        <input type="checkbox" ${item.available ? "checked" : ""} onclick="toggleItem('${item._id}', ${item.available})"> AVAILABLE
                    </label>
                    <div>
                        <button style="border:none; background:none; color:#6366f1; font-weight:700; cursor:pointer;" onclick="editItem('${item._id}')">EDIT</button>
                        <button style="border:none; background:none; color:#ef4444; font-weight:700; cursor:pointer; margin-left:10px;" onclick="deleteItem('${item._id}')">DEL</button>
                    </div>
                </div>
            </div>
        </div>`;
    });
}

async function toggleItem(id, currentStatus){
    await fetch(`${API_URL}/item-update/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ available: !currentStatus })
    });
    fetchMenu();
}

function filterMenu(cat,e){
    document.querySelectorAll(".category-buttons button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    displayMenu(cat==="All" ? menu : menu.filter(m=>m.category===cat));
}

async function addItem(){
    let name = document.getElementById("name").value;
    let desc = document.getElementById("desc").value;
    let price = Number(document.getElementById("price").value);
    let quantity = Number(document.getElementById("quantity").value);
    let category = document.getElementById("isSpecial").checked ? "Special" : document.getElementById("category").value;
    let imageUrl = document.getElementById("imageUrl").value;
    let imageFile = document.getElementById("imageFile").files[0];

    if(!name || !price) return alert("Enter Name and Price!");

    if(imageFile){
        let reader = new FileReader();
        reader.onload = function(e){ saveToDatabase(name, desc, price, quantity, category, e.target.result); };
        reader.readAsDataURL(imageFile);
    } else {
        saveToDatabase(name, desc, price, quantity, category, imageUrl);
    }
}

async function saveToDatabase(name, description, price, quantity, category, image){
    let payload = { name, description, price, quantity, category, image };
    try {
        let url = editId ? `${API_URL}/item-update/${editId}` : `${API_URL}/item-insert`;
        await fetch(url, {
            method: editId ? "PUT" : "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        location.reload();
    } catch (err) { alert("Error saving item."); }
}

function editItem(id){
    let item = menu.find(m => m._id === id); if(!item) return;
    document.getElementById("name").value = item.name;
    document.getElementById("desc").value = item.description || "";
    document.getElementById("price").value = item.price;
    document.getElementById("quantity").value = item.quantity || 0;
    document.getElementById("imageUrl").value = item.image || "";
    document.getElementById("isSpecial").checked = (item.category === "Special");
    editId = id; window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteItem(id){
    if(!confirm("Are you sure you want to delete this item?")) return;
    await fetch(`${API_URL}/item-delete/${id}`, { method: "DELETE" });
    fetchMenu();
}

// Fetch Navbar
fetch("navbar.html").then(r => r.text()).then(d => document.getElementById("navbar-container").innerHTML = d);

// Initialize Page
loadCategories();
fetchMenu();
</script>
</body>
</html>
