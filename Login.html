<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Manager Login | GCU</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
            color: white;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .logo img {
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
        }

        h1 {
            font-size: 18px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #94a3b8;
            padding-left: 5px;
        }

        .input-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .input-box:focus-within {
            border-color: #3498db;
            background: rgba(0, 0, 0, 0.3);
        }

        .input-box i {
            color: #3498db;
            font-size: 16px;
        }

        .input-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-size: 15px;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #3498db;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
        }

        .footer p {
            margin-top: 5px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo">
            <img src="https://www.gurucharanuniversity.ac.in/images/gcu_logo.png" width="80" height="110" alt="GCU Logo">
        </div>

        <h1>Gurucharan University Canteen</h1>
        <p class="subtitle">Sign in to continue to Panel</p>

        <div class="input-group">
            <label>Username</label>
            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="username" placeholder="Enter username">
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password">
            </div>
        </div>

        <button class="login-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <div class="footer">
        Made with ❤️ By Team Sigma 
        <p>Copyright © 2026 Canteen Manager. All rights reserved.</p>
    </div>

    <script>
async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!user || !pass) {
        alert("Please enter both username and password.");
        return;
    }

    try {
        // 👇 THIS IS THE BRIDGE BETWEEN FRONTEND AND BACKEND 👇
        const response = await fetch("http://localhost:8000/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass })
        });

        const result = await response.json();

        if (result.status === 1) {
            // Login Success! 
            sessionStorage.setItem("isAdminLoggedIn", "true");
            sessionStorage.setItem("userRole", result.role);

            alert("Welcome " + result.role.toUpperCase() + "!");
            window.location.href = "dashboard.html";
        } else {
            // Login Failed (Wrong password or username)
            alert(result.message); 
        }
    } catch (err) {
        console.error("Fetch error:", err);
        alert("Cannot connect to the backend server. Is your Node server running?");
    }
}
</script>

</body>
</html>
