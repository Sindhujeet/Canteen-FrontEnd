<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Manager Login | GCU</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
            color: white;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .logo img {
            margin-bottom: 15px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #94a3b8;
            padding-left: 5px;
        }

        .input-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #2980b9;
        }

        .footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo">
            <img src="https://www.gurucharanuniversity.ac.in/images/gcu_logo.png" width="80" height="110">
        </div>

        <h1>Gurucharan University Canteen</h1>
        <p class="subtitle">Sign in to continue to Panel</p>

        <div class="input-group">
            <label>Username</label>
            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="username" placeholder="Enter username">
            </div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password">
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="login-btn" style="flex:1;" onclick="handleLogin()">Sign In</button>
            <button class="login-btn" style="flex:1; background:#64748b;" onclick="openRegister()">Register</button>
        </div>

        <p style="margin-top:15px;font-size:13px;">
            Don't have an account?
            <span style="color:#3498db;cursor:pointer;" onclick="openRegister()">Register</span>
        </p>
    </div>

    <div id="registerPopup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter: blur(5px);justify-content:center;align-items:center;z-index: 100;">
        <div style="background:#1e293b;padding:30px;border-radius:15px;width:350px;border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="text-align:center;margin-bottom:15px;">Register Account</h3>

            <input type="text" id="regUsername" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;background:#0f172a;color:white;outline:none;">
            <input type="password" id="regPassword" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;background:#0f172a;color:white;outline:none;">
            
            <label style="margin-bottom: 5px;">Select Role</label>
            <select id="regRole" style="width:100%;padding:10px;margin-bottom:15px;border-radius:8px;border:none;background:#0f172a;color:white;outline:none;">
                <option value="staff">Staff</option>
                <option value="manager">Manager</option>
            </select>

            <button onclick="handleRegister()" style="width:100%;padding:12px;border:none;border-radius:8px;background:#3498db;color:white;font-weight:bold;cursor:pointer;">Create Account</button>
            <button onclick="closeRegister()" style="width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:#64748b;color:white;cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div class="footer">
        Made with ❤️ By Team Sigma<br>Copyright &copy; 2026 Team Sigma. All rights reserved.
    </div>

<script>
// ── LOGIN LOGIC ──────────────────────────────────────────────
async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    if(!user || !pass) return alert("Please enter both username and password.");

    try {
        const res = await fetch("https://canteen-backend-jjya.onrender.com/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass })
        });

        const result = await res.json();

        if (result.status === 1) {
            // 🔥 CRITICAL: Save the session data for the Sales page to check
            sessionStorage.setItem("isAdminLoggedIn", "true");
            sessionStorage.setItem("userRole", result.role); // e.g., 'manager'
            sessionStorage.setItem("userName", user);

            alert("Welcome back, " + user + " (" + result.role.toUpperCase() + ")");
            window.location.href = "dashboard.html";
        } else {
            alert(result.message);
        }
    } catch (err) {
        console.error("Login Error:", err);
        alert("Could not connect to server. Is the backend running?");
    }
}

// ── REGISTRATION POPUP LOGIC ──────────────────────────────────
function openRegister() {
    document.getElementById("registerPopup").style.display = "flex";
}

function closeRegister() {
    document.getElementById("registerPopup").style.display = "none";
}

// ── REGISTRATION LOGIC ───────────────────────────────────────
async function handleRegister() {
    const user = document.getElementById("regUsername").value.trim();
    const pass = document.getElementById("regPassword").value.trim();
    const role = document.getElementById("regRole").value;

    if(!user || !pass) return alert("All fields are required.");

    try {
        const res = await fetch("https://canteen-backend-jjya.onrender.com/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass, role: role })
        });

        const result = await res.json();

        if (result.status === 1) {
            alert("Registered Successfully! You can now sign in.");
            closeRegister();
        } else {
            alert(result.message || "User already exists!");
        }
    } catch (err) {
        console.error("Register Error:", err);
        alert("Server error. Please try again later.");
    }
}
</script>

</body>
</html>
